<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DON'T LOOK AWAY</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#000;overflow:hidden;font-family:'Courier New',monospace;}
  #canvas{display:block;}
  #vignette{position:fixed;inset:0;pointer-events:none;z-index:5;
    background:radial-gradient(ellipse 56% 46% at 50% 50%,
      transparent 0%,transparent 26%,
      rgba(0,0,0,.52) 50%,rgba(0,0,0,.84) 70%,rgba(0,0,0,.97) 83%,#000 100%);}
  #scanlines{position:fixed;inset:0;pointer-events:none;z-index:6;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.022) 2px,rgba(0,0,0,.022) 4px);}

  #bat-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:190px;z-index:20;}
  #bat-lbl{color:#777;font-size:9px;letter-spacing:3px;text-transform:uppercase;margin-bottom:4px;text-align:center;}
  #bat-track{width:100%;height:7px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
  #bat-fill{height:100%;width:100%;background:linear-gradient(90deg,#f4c542,#ffe88a);border-radius:2px;}

  #btn-hud{position:fixed;top:16px;left:50%;transform:translateX(-50%);display:flex;gap:9px;z-index:20;}
  .bd{width:12px;height:12px;border-radius:50%;border:2px solid rgba(255,255,255,.18);background:rgba(200,10,10,.15);transition:all .3s;}
  .bd.on{background:#0f0;border-color:#0f0;box-shadow:0 0 7px #0f0;}

  #minimap{position:fixed;top:12px;right:12px;z-index:20;border:1px solid rgba(255,255,255,.07);image-rendering:pixelated;}

  #xhair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:14px;height:14px;z-index:20;pointer-events:none;}
  #xhair::before,#xhair::after{content:'';position:absolute;background:rgba(255,255,255,.28);}
  #xhair::before{width:2px;height:100%;left:50%;transform:translateX(-50%);}
  #xhair::after{width:100%;height:2px;top:50%;transform:translateY(-50%);}

  #overlay{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.94);color:#fff;}
  #overlay h1{font-size:clamp(24px,5vw,54px);letter-spacing:.2em;text-transform:uppercase;color:#cc2200;margin-bottom:14px;text-shadow:0 0 28px #f00a;}
  #overlay p{color:#666;font-size:11px;letter-spacing:2px;max-width:440px;text-align:center;line-height:2.1;margin-bottom:4px;}
  #overlay button{margin-top:24px;padding:10px 32px;background:transparent;border:1px solid #cc2200;color:#cc2200;font-family:'Courier New',monospace;font-size:12px;letter-spacing:3px;cursor:pointer;text-transform:uppercase;pointer-events:all;transition:background .2s,color .2s;}
  #overlay button:hover{background:#cc2200;color:#fff;}
  #diffMenu{display:flex;gap:16px;margin-top:20px;}
  .diffBtn{padding:12px 24px;background:transparent;border:2px solid rgba(255,255,255,.3);color:rgba(255,255,255,.6);font-family:'Courier New',monospace;font-size:11px;letter-spacing:2px;cursor:pointer;text-transform:uppercase;pointer-events:all;transition:all .2s;}
  .diffBtn:hover{border-color:rgba(255,255,255,.8);color:rgba(255,255,255,.9);}
  .diffBtn.active{border-color:#cc2200;background:#cc2200;color:#fff;}

  #msg{position:fixed;top:46%;left:50%;transform:translate(-50%,-50%);color:#fff;font-size:19px;letter-spacing:3px;z-index:30;text-shadow:0 0 16px #fff;pointer-events:none;opacity:0;transition:opacity .4s;text-transform:uppercase;text-align:center;}
  #prompt{position:fixed;bottom:66px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.4);font-size:10px;letter-spacing:3px;z-index:20;pointer-events:none;text-align:center;}
  #warn{position:fixed;top:50%;right:18px;transform:translateY(-50%);color:rgba(255,40,40,.85);font-size:8px;letter-spacing:2px;z-index:20;pointer-events:none;writing-mode:vertical-rl;text-transform:uppercase;opacity:0;transition:opacity .2s;text-shadow:0 0 12px red;}
  #jumpscare{position:fixed;inset:0;z-index:120;display:none;align-items:center;justify-content:center;background:#000;overflow:hidden;}
  #jumpscare img{position:absolute;top:50%;left:50%;width:110vw;height:110vh;max-width:none;max-height:none;object-fit:cover;transform:translate(-50%,-50%);filter:contrast(1.4) saturate(1.3);animation:shake .06s ease-in-out infinite;}
  #jumpscare::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,0.15) 0%,rgba(255,255,255,0) 20%,rgba(255,255,255,0.15) 100%);mix-blend-mode:screen;pointer-events:none;animation:staticFlicker .03s steps(2) infinite;}
  #jumpscare::after{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px, transparent 1px);background-size:8px 8px;opacity:.6;mix-blend-mode:screen;pointer-events:none;}
  @keyframes staticFlicker{0%,100%{opacity:.6;}50%{opacity:.15;}}
  @keyframes shake{0%{transform:translate(-50%,-50%) translate(0,0) rotate(0deg);}10%{transform:translate(-50%,-50%) translate(-10px,6px) rotate(-1.5deg);}20%{transform:translate(-50%,-50%) translate(8px,-8px) rotate(1deg);}30%{transform:translate(-50%,-50%) translate(-8px,8px) rotate(-1deg);}40%{transform:translate(-50%,-50%) translate(10px,-4px) rotate(1.5deg);}50%{transform:translate(-50%,-50%) translate(-6px,10px) rotate(-1deg);}60%{transform:translate(-50%,-50%) translate(6px,-10px) rotate(1deg);}70%{transform:translate(-50%,-50%) translate(-10px,4px) rotate(-1.5deg);}80%{transform:translate(-50%,-50%) translate(8px,8px) rotate(1deg);}90%{transform:translate(-50%,-50%) translate(-4px,-8px) rotate(-1deg);}100%{transform:translate(-50%,-50%) translate(0,0) rotate(0deg);}}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="vignette"></div>
<div id="scanlines"></div>
<div id="btn-hud"></div>
<canvas id="minimap" width="110" height="110"></canvas>
<div id="xhair"></div>
<div id="bat-bar"><div id="bat-lbl">🔦 power</div><div id="bat-track"><div id="bat-fill"></div></div></div>
<div id="msg"></div>
<div id="prompt">WASD · MOUSE · E</div>
<div id="warn">LOOK AT IT</div>
<div id="jumpscare"><img id="jumpscareImg" alt="jumpscare"></div>
<div id="overlay">
  <h1>DON'T LOOK AWAY</h1>
  <p>Find 5 buttons on the walls. Walk over batteries.<br>
  <span></span>
  Don't look away and don't let your flashlight die.</span></p>
  <div id="diffMenu" style="display:none;">
    <button class="diffBtn active" data-diff="normal">NORMAL</button>
    <button class="diffBtn" data-diff="hard">HARD</button>
  </div>
  <button id="startBtn">ENTER</button>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ══════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════
const CELL=4,MW=17,MH=17,WH=3.0,PH=1.65,SPD=5.0;
const DRAIN=0.022;   // much faster drain
const REFILL=0.45;
let E_SLOW=0.5, E_FAST=6.8;  // slower when visible, faster when hidden behind walls
let difficulty='normal';

let scene,camera,renderer,spot,spotTgt;
let maze=[];
let btns=[],bats=[],door=null;
let entGrp,entFace;
let wallMeshes=[];
let power=1,bPr=0;
let dead=false,won=false,active=false;
let yaw=0,pitch=0;
let keys={f:0,b:0,l:0,r:0};
const pPos=new THREE.Vector3();
let fT=0,fV=1,msgTO;
const frustum=new THREE.Frustum(),psm=new THREE.Matrix4();
const raycaster=new THREE.Raycaster();
let jumpscareImg;
let jumpscareAudioContext;
const JUMPSCARE_SRC='https://images.steamusercontent.com/ugc/1977673593778539093/C936564183A88ADE64BFA7BFADAAA9DF51EF63BE/?imw=637&imh=358&ima=fit&impolicy=Letterbox&imcolor=%23000000&letterbox=true';
const _f=new THREE.Vector3(),_r=new THREE.Vector3(),_v=new THREE.Vector3();

// BFS path cache
let entPath=[], entPathTimer=0;
const PATH_INTERVAL=0.45; // recalculate path every N seconds

// ══════════════════════════════════════════
//  MAZE
// ══════════════════════════════════════════
function genMaze(){
  maze=Array.from({length:MH},()=>Array(MW).fill(1));
  function carve(cx,cy){
    [[0,-2],[0,2],[-2,0],[2,0]].sort(()=>Math.random()-.5).forEach(([dx,dy])=>{
      const nx=cx+dx,ny=cy+dy;
      if(nx>0&&nx<MW-1&&ny>0&&ny<MH-1&&maze[ny][nx]===1){
        maze[cy+dy/2][cx+dx/2]=0;maze[ny][nx]=0;carve(nx,ny);
      }
    });
  }
  maze[1][1]=0;carve(1,1);
}
const c2w=(cx,cy)=>new THREE.Vector3(cx*CELL+CELL/2,0,cy*CELL+CELL/2);
const w2c=(wx,wz)=>({cx:Math.floor(wx/CELL),cy:Math.floor(wz/CELL)});
const open=(cx,cy)=>cx>=0&&cy>=0&&cx<MW&&cy<MH&&maze[cy][cx]===0;

function randOpen(md=4){
  let cx,cy,tries=0;
  do{
    cx=1+Math.floor(Math.random()*(MW-2));
    cy=1+Math.floor(Math.random()*(MH-2));
    tries++;
  }while((!open(cx,cy)||(Math.abs(cx-1)+Math.abs(cy-1))<md)&&tries<5000);
  return{cx,cy};
}

function randWallFace(md=3){
  const D=[[-1,0],[1,0],[0,-1],[0,1]];
  for(let a=0;a<4000;a++){
    const cx=1+Math.floor(Math.random()*(MW-2));
    const cy=1+Math.floor(Math.random()*(MH-2));
    if(!open(cx,cy))continue;
    if((Math.abs(cx-1)+Math.abs(cy-1))<md)continue;
    const wd=D.filter(([dx,dy])=>!open(cx+dx,cy+dy));
    if(!wd.length)continue;
    const[dx,dy]=wd[Math.floor(Math.random()*wd.length)];
    return{wx:cx*CELL+CELL/2+dx*(CELL/2-.09),wz:cy*CELL+CELL/2+dy*(CELL/2-.09),nx:-dx,nz:-dy,cx,cy};
  }
  return null;
}

// ══════════════════════════════════════════
//  BFS PATHFINDING
// ══════════════════════════════════════════
function bfsPath(sx,sz,ex,ez){
  const sc=w2c(sx,sz), ec=w2c(ex,ez);
  if(sc.cx===ec.cx&&sc.cy===ec.cy)return[];
  const visited=Array.from({length:MH},()=>Array(MW).fill(false));
  const prev=Array.from({length:MH},()=>Array(MW).fill(null));
  const q=[[sc.cx,sc.cy]];
  visited[sc.cy][sc.cx]=true;
  const dirs=[[-1,0],[1,0],[0,-1],[0,1]];
  let found=false;
  while(q.length&&!found){
    const[cx,cy]=q.shift();
    for(const[dx,dy]of dirs){
      const nx=cx+dx,ny=cy+dy;
      if(open(nx,ny)&&!visited[ny][nx]){
        visited[ny][nx]=true;
        prev[ny][nx]=[cx,cy];
        if(nx===ec.cx&&ny===ec.cy){found=true;break;}
        q.push([nx,ny]);
      }
    }
  }
  if(!found)return[];
  const path=[];
  let cur=[ec.cx,ec.cy];
  while(cur[0]!==sc.cx||cur[1]!==sc.cy){
    path.unshift(cur);
    cur=prev[cur[1]][cur[0]];
    if(!cur)return[];
  }
  return path; // array of [cx,cy]
}

// ══════════════════════════════════════════
//  TEXTURES
// ══════════════════════════════════════════
let wallT,floorT;
function mkTex(){
  // Wall
  const wc=document.createElement('canvas');wc.width=wc.height=64;
  const wx=wc.getContext('2d');
  wx.fillStyle='#2c2c2c';wx.fillRect(0,0,64,64);
  wx.strokeStyle='#191919';wx.lineWidth=1.5;
  for(let y=0;y<64;y+=16){
    const off=(Math.floor(y/16)%2)*32;
    wx.beginPath();wx.moveTo(0,y);wx.lineTo(64,y);wx.stroke();
    for(let x=off-32;x<96;x+=64){wx.beginPath();wx.moveTo(x,y);wx.lineTo(x,y+16);wx.stroke();}
  }
  for(let i=0;i<50;i++){wx.fillStyle=`rgba(0,0,0,${Math.random()*.09})`;wx.fillRect(Math.random()*64,Math.random()*64,2,2);}
  wallT=new THREE.CanvasTexture(wc);
  wallT.wrapS=wallT.wrapT=THREE.RepeatWrapping;wallT.repeat.set(1,.75);

  // Floor
  const fc=document.createElement('canvas');fc.width=fc.height=64;
  const fx=fc.getContext('2d');
  fx.fillStyle='#1d1d1d';fx.fillRect(0,0,64,64);
  fx.strokeStyle='#151515';fx.lineWidth=1;
  for(let i=0;i<64;i+=32){fx.beginPath();fx.moveTo(i,0);fx.lineTo(i,64);fx.stroke();fx.beginPath();fx.moveTo(0,i);fx.lineTo(64,i);fx.stroke();}
  floorT=new THREE.CanvasTexture(fc);
  floorT.wrapS=floorT.wrapT=THREE.RepeatWrapping;
}

function initJumpscare(){
  jumpscareImg=document.getElementById('jumpscareImg');
  const loader=new THREE.TextureLoader();
  loader.load(JUMPSCARE_SRC,
    texture=>{
      if(texture.image && texture.image.src){
        jumpscareImg.src = texture.image.currentSrc || texture.image.src;
      } else {
        jumpscareImg.src = JUMPSCARE_SRC;
      }
    },
    undefined,
    err=>{
      console.warn('Jumpscare texture load failed:', err);
      jumpscareImg.src = JUMPSCARE_SRC;
    }
  );
  jumpscareImg.onerror = ()=>console.warn('Jumpscare image failed to load:', JUMPSCARE_SRC);
}

function unlockJumpscareAudio(){
  if(!window.AudioContext && !window.webkitAudioContext) return;
  try{
    if(!jumpscareAudioContext){
      jumpscareAudioContext=new(window.AudioContext||window.webkitAudioContext)();
    }
    if(jumpscareAudioContext.state==='suspended'){
      const resumeResult=jumpscareAudioContext.resume();
      if(resumeResult && resumeResult.then) resumeResult.catch(()=>{});
    }
  }catch(e){
    console.warn('Jumpscare audio unlock failed:', e);
  }
}

function playJumpscareSound(){
  if(!window.AudioContext&&!window.webkitAudioContext)return;
  try{
    if(!jumpscareAudioContext) jumpscareAudioContext=new(window.AudioContext||window.webkitAudioContext)();
    if(jumpscareAudioContext.state==='suspended') jumpscareAudioContext.resume();
    const ac=jumpscareAudioContext;
    const now=ac.currentTime;
    const duration=3.5;
    const noiseLength=Math.floor(ac.sampleRate*duration);
    const noiseBuffer=ac.createBuffer(1,noiseLength,ac.sampleRate);
    const noiseData=noiseBuffer.getChannelData(0);
    for(let i=0;i<noiseLength;i++){
      const env=1 - i/noiseLength;
      noiseData[i]=(Math.random()*2-1)*env;
    }
    const noise=ac.createBufferSource();
    noise.buffer=noiseBuffer;
    const noiseGain=ac.createGain();
    noiseGain.gain.setValueAtTime(1.1,now);
    noiseGain.gain.exponentialRampToValueAtTime(0.01,now+duration);
    noise.connect(noiseGain).connect(ac.destination);
    noise.start(now);
    noise.stop(now+duration);
  }catch(e){console.warn('Jumpscare sound failed:',e);}
}

function triggerJumpscare(){
  const js=document.getElementById('jumpscare');
  js.style.display='flex';
  playJumpscareSound();
  setTimeout(()=>{js.style.display='none';},3600);
}

// ══════════════════════════════════════════
//  BUILD SCENE
// ══════════════════════════════════════════
function buildScene(){
  while(scene.children.length)scene.remove(scene.children[0]);
  btns=[];bats=[];door=null;entPath=[];entPathTimer=0;

  scene.add(new THREE.AmbientLight(0x060610,1));

  spot=new THREE.SpotLight(0xfff4c0,5,18,Math.PI*.27,.44,2.2);
  spotTgt=new THREE.Object3D();spotTgt.position.set(0,0,-1);
  camera.add(spot);camera.add(spotTgt);
  spot.position.set(.14,-.04,0);spot.target=spotTgt;
  scene.add(camera);

  const wMat=new THREE.MeshLambertMaterial({map:wallT,color:0x8a8a8a});
  const fMat=new THREE.MeshLambertMaterial({map:floorT,color:0x5a5a5a});
  const cMat=new THREE.MeshLambertMaterial({color:0x161620});

  wallMeshes=[];
  for(let cy=0;cy<MH;cy++) for(let cx=0;cx<MW;cx++){
    const wx=cx*CELL,wz=cy*CELL;
    if(maze[cy][cx]===1){
      const m=new THREE.Mesh(new THREE.BoxGeometry(CELL,WH,CELL),wMat);
      m.position.set(wx+CELL/2,WH/2,wz+CELL/2);scene.add(m);
      wallMeshes.push(m);
    }
    const fm=new THREE.Mesh(new THREE.PlaneGeometry(CELL,CELL),fMat);
    fm.rotation.x=-Math.PI/2;fm.position.set(wx+CELL/2,0,wz+CELL/2);scene.add(fm);
    const cm=new THREE.Mesh(new THREE.PlaneGeometry(CELL,CELL),cMat);
    cm.rotation.x=Math.PI/2;cm.position.set(wx+CELL/2,WH,wz+CELL/2);scene.add(cm);
  }

  // BUTTONS on walls
  const bGeo=new THREE.CylinderGeometry(.15,.15,.1,10);
  for(let i=0;i<5;i++){
    const f=randWallFace(3);if(!f)continue;
    const mat=new THREE.MeshLambertMaterial({color:0xdd1100,emissive:0x440000});
    const mesh=new THREE.Mesh(bGeo,mat);
    const ang=Math.atan2(f.nx,f.nz);
    mesh.rotation.set(Math.PI/2,0,ang);
    mesh.position.set(f.wx,1.3,f.wz);
    const pl=new THREE.PointLight(0xff1100,.65,2.6);
    pl.position.set(f.wx,1.3,f.wz);
    scene.add(pl);scene.add(mesh);
    btns.push({mesh,mat,pl,pressed:false,pos:new THREE.Vector3(f.wx,1.3,f.wz),cx:f.cx,cy:f.cy});
  }

  // BATTERIES on floor
  const baGeo=new THREE.CylinderGeometry(.10,.10,.30,8);
  const baMat=new THREE.MeshLambertMaterial({color:0xffcc00,emissive:0x332200});
  for(let i=0;i<10;i++){
    const{cx,cy}=randOpen(2);
    const p=c2w(cx,cy);p.y=.20;
    const mesh=new THREE.Mesh(baGeo,baMat);mesh.position.copy(p);
    const pl=new THREE.PointLight(0xffaa00,.3,1.8);pl.position.copy(p);
    scene.add(pl);scene.add(mesh);
    bats.push({mesh,pl,pos:p.clone(),cx,cy,collected:false});
  }

  // ENTITY — spawned after, once player pos is set
}

// ═══════════════════════════════════════
// ═══
//  ENTITY
// ══════════════════════════════════════════
// ══════════════════════════════════════════
//  ENTITY
// ══════════════════════════════════════════
function spawnEntity(){
  if(entGrp)scene.remove(entGrp);
  entGrp=new THREE.Group();

  // Load scary face from URL
  const textureLoader=new THREE.TextureLoader();
  textureLoader.load('https://images.steamusercontent.com/ugc/1977673593778539093/C936564183A88ADE64BFA7BFADAAA9DF51EF63BE/?imw=637&imh=358&ima=fit&impolicy=Letterbox&imcolor=%23000000&letterbox=true',
    function(texture){
      texture.magFilter=THREE.LinearFilter;
      texture.minFilter=THREE.LinearFilter;
      
      const cubeGeom=new THREE.BoxGeometry(1.5,2.0,0.5);
      const cubeMat=new THREE.MeshBasicMaterial({map:texture,side:THREE.FrontSide});
      entFace=new THREE.Mesh(cubeGeom,cubeMat);
      entFace.position.y=1.55;
      
      if(entGrp)entGrp.add(entFace);
    }
  );

  // Spawn directly in front of player at start, in the corridor ahead
  const startX=CELL*1.5;
  const startZ=CELL*1.5;
  let ex=1,ez=4;
  if(!open(ex,ez)){const r=randOpen(5);ex=r.cx;ez=r.cy;}
  const ep=c2w(ex,ez);
  entGrp.position.set(ep.x,0,ep.z);
  entGrp.rotation.y=Math.atan2(startX-ep.x,startZ-ep.z);
  scene.add(entGrp);

  entPath=[];entPathTimer=0;
}

// ══════════════════════════════════════════
//  COLLISION
// ══════════════════════════════════════════
function collide(pos,r=.30){
  for(const[ox,oz]of[[-r,-r],[r,-r],[-r,r],[r,r]]){
    const cx=Math.floor((pos.x+ox)/CELL),cy=Math.floor((pos.z+oz)/CELL);
    if(cx<0||cy<0||cx>=MW||cy>=MH||maze[cy][cx]===1)return true;
  }
  return false;
}

// ══════════════════════════════════════════
//  ENTITY VISIBILITY CHECK
// ══════════════════════════════════════════
function canSeeEntity(){
  const ep=entGrp.position.clone();ep.y+=1.5;
  const dir=ep.clone().sub(camera.position).normalize();
  raycaster.set(camera.position,dir);
  const dist=ep.distanceTo(camera.position);
  const hits=raycaster.intersectObjects(wallMeshes,false);
  return !hits.some(hit=>hit.distance<dist-0.05);
}

function isLookingAt(pos, threshold=0.96){
  const dir=new THREE.Vector3();
  camera.getWorldDirection(dir);
  const toTarget=pos.clone().sub(camera.position).normalize();
  return dir.dot(toTarget) >= threshold;
}

function isWatched(){
  psm.multiplyMatrices(camera.projectionMatrix,camera.matrixWorldInverse);
  frustum.setFromProjectionMatrix(psm);
  const ep=entGrp.position.clone();ep.y+=1.5;
  if(!frustum.containsPoint(ep))return false;
  const dir=ep.clone().sub(camera.position).normalize();
  const cd=new THREE.Vector3();camera.getWorldDirection(cd);
  return dir.dot(cd)>.28;
}

// ══════════════════════════════════════════
//  INPUT
// ══════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(!active)return;
  if(e.code==='KeyW'||e.code==='ArrowUp')   keys.f=1;
  if(e.code==='KeyS'||e.code==='ArrowDown') keys.b=1;
  if(e.code==='KeyA'||e.code==='ArrowLeft') keys.l=1;
  if(e.code==='KeyD'||e.code==='ArrowRight')keys.r=1;
  if(e.code==='KeyE')interact();
});
document.addEventListener('keyup',e=>{
  if(e.code==='KeyW'||e.code==='ArrowUp')   keys.f=0;
  if(e.code==='KeyS'||e.code==='ArrowDown') keys.b=0;
  if(e.code==='KeyA'||e.code==='ArrowLeft') keys.l=0;
  if(e.code==='KeyD'||e.code==='ArrowRight')keys.r=0;
});
let locked=false;
document.addEventListener('pointerlockchange',()=>locked=!!document.pointerLockElement);
document.addEventListener('mousemove',e=>{
  if(!locked||!active)return;
  yaw  -=e.movementX*.0020;
  pitch-=e.movementY*.0020;
  pitch=Math.max(-Math.PI/2.1,Math.min(Math.PI/2.1,pitch));
});
document.addEventListener('click',()=>{if(active)document.body.requestPointerLock();});

// ══════════════════════════════════════════
//  INTERACT
// ══════════════════════════════════════════
function interact(){
  for(const b of btns){
    if(b.pressed)continue;
    const dist=pPos.distanceTo(b.pos);
    if(dist<2.0){
      if(isLookingAt(b.pos)){
        b.pressed=true;b.mat.color.set(0x00ff00);b.mat.emissive.set(0x003300);b.pl.color.set(0x00ff00);
        bPr++;updBtnHUD();showMsg(`BUTTON ${bPr} / 5`,1800);
        if(bPr===5)setTimeout(spawnDoor,1100);
      } else {
        showMsg('LOOK DIRECTLY AT IT',1200);
      }
      return;
    }
  }
  if(door&&pPos.distanceTo(door.pos)<2.5)trigWin();
}

// ══════════════════════════════════════════
//  DOOR
// ══════════════════════════════════════════
function spawnDoor(){
  const{cx,cy}=randOpen(5);const p=c2w(cx,cy);
  const mesh=new THREE.Mesh(new THREE.BoxGeometry(1.1,2.5,.14),
    new THREE.MeshLambertMaterial({color:0x00ff88,emissive:0x004422}));
  mesh.position.set(p.x,1.25,p.z);
  const pl=new THREE.PointLight(0x00ff88,1.2,5);pl.position.copy(mesh.position);
  scene.add(pl);scene.add(mesh);
  door={mesh,pl,pos:new THREE.Vector3(p.x,0,p.z),cx,cy};
  showMsg('A DOOR HAS APPEARED',3000);
}

// ══════════════════════════════════════════
//  HUD
// ══════════════════════════════════════════
function updBtnHUD(){
  const h=document.getElementById('btn-hud');h.innerHTML='';
  for(let i=0;i<5;i++){const d=document.createElement('div');d.className='bd'+(i<bPr?' on':'');h.appendChild(d);}
}
function updBatHUD(){
  const f=document.getElementById('bat-fill');
  f.style.width=(Math.max(0,power)*100).toFixed(1)+'%';
  f.style.background=power>.5?'linear-gradient(90deg,#f4c542,#ffe88a)':power>.2?'linear-gradient(90deg,#e08020,#ffaa40)':'linear-gradient(90deg,#cc2200,#ff4400)';
}
let msgTO2;
function showMsg(t,d=2000){
  const el=document.getElementById('msg');el.textContent=t;el.style.opacity='1';
  clearTimeout(msgTO2);msgTO2=setTimeout(()=>el.style.opacity='0',d);
}

// ══════════════════════════════════════════
//  MINIMAP  — fixed direction arrow
//  In Three.js: yaw=0 → looking toward -Z (north on map = up)
//  sin(yaw) gives X component, cos(yaw) gives Z component
//  On a top-down map where +X=right, +Z=down:
//    map_dx = sin(yaw), map_dy = cos(yaw)  (no negation on X)
// ══════════════════════════════════════════
function drawMap(){
  const mc=document.getElementById('minimap');
  const ctx=mc.getContext('2d');
  const cw=mc.width,ch=mc.height,cW=cw/MW,cH=ch/MH;
  ctx.fillStyle='#000';ctx.fillRect(0,0,cw,ch);
  for(let cy=0;cy<MH;cy++) for(let cx=0;cx<MW;cx++){
    ctx.fillStyle=maze[cy][cx]?'#252525':'#0a0a0a';
    ctx.fillRect(cx*cW,cy*cH,cW-.3,cH-.3);
  }
  if(difficulty!=='hard'){
    for(const b of btns){ctx.fillStyle=b.pressed?'#0f0':'#f20';ctx.fillRect(b.cx*cW+1,b.cy*cH+1,cW-2,cH-2);}
  }
  for(const b of bats) if(!b.collected){ctx.fillStyle='#fc0';ctx.fillRect(b.cx*cW+2,b.cy*cH+2,cW-4,cH-4);}
  if(door){ctx.fillStyle='#0ff';ctx.fillRect(door.cx*cW,door.cy*cH,cW,cH);}
  // Player dot
  const{cx:px,cy:py}=w2c(pPos.x,pPos.z);
  const pmx=px*cW+cW/2,pmy=py*cH+cH/2;
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(pmx,pmy,3.5,0,Math.PI*2);ctx.fill();
  const ARR=8;
  const adx=-Math.sin(yaw)*ARR;
  const ady=-Math.cos(yaw)*ARR;
  ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.beginPath();
  ctx.moveTo(pmx,pmy);ctx.lineTo(pmx+adx,pmy+ady);ctx.stroke();
}

// ══════════════════════════════════════════
//  FLASHLIGHT
// ══════════════════════════════════════════
function tickFlash(dt){
  fT+=dt;
  const s=Math.sin(fT*1.8)*.5+.5,m=Math.sin(fT*13.1)*.5+.5,f2=Math.sin(fT*51.7)*.5+.5;
  fV=.84+s*.05+m*.06+f2*.05;
  if(Math.random()<.004)fV*=.15+Math.random()*.5;
  if(power<.2&&Math.random()<.05)fV*=Math.random()*.2;
  fV=Math.max(0,fV*power);
  if(spot){
    spot.intensity=fV*5;spot.distance=fV*18;
    const w=1-power*.3;spot.color.setRGB(1,.97-w*.1,.84-w*.22);
  }
  document.getElementById('vignette').style.opacity=Math.min(1,.82+(1-power)*.18+(1-fV)*.14);
}

// ══════════════════════════════════════════
//  DEATH / WIN
// ══════════════════════════════════════════
function die(msg='The darkness consumed you.'){
  if(dead||won)return;dead=true;active=false;document.exitPointerLock();
  triggerJumpscare();
  const o=document.getElementById('overlay');
  o.querySelector('h1').textContent="YOU'RE DEAD";
  o.querySelector('p').textContent=msg;
  o.querySelector('button').textContent='TRY AGAIN';o.style.display='flex';
}
function trigWin(){
  if(dead||won)return;won=true;active=false;document.exitPointerLock();
  const o=document.getElementById('overlay');
  o.querySelector('h1').textContent='ESCAPED';
  o.querySelector('p').textContent='You made it out. For now.';
  o.querySelector('button').textContent='PLAY AGAIN';o.style.display='flex';
}

// ══════════════════════════════════════════
//  GAME LOOP
// ══════════════════════════════════════════
const clk=new THREE.Clock();
function loop(){
  requestAnimationFrame(loop);
  const dt=Math.min(clk.getDelta(),.05);
  if(!active){renderer.render(scene,camera);return;}

  // Player movement
  _f.set(-Math.sin(yaw),0,-Math.cos(yaw));
  _r.set(Math.cos(yaw),0,-Math.sin(yaw));
  _v.set(0,0,0);
  if(keys.f)_v.addScaledVector(_f,1);if(keys.b)_v.addScaledVector(_f,-1);
  if(keys.l)_v.addScaledVector(_r,-1);if(keys.r)_v.addScaledVector(_r,1);
  if(_v.lengthSq()>0)_v.normalize().multiplyScalar(SPD*dt);
  if(!collide({x:pPos.x+_v.x,z:pPos.z}))pPos.x+=_v.x;
  if(!collide({x:pPos.x,z:pPos.z+_v.z}))pPos.z+=_v.z;
  camera.position.copy(pPos);
  camera.rotation.order='YXZ';camera.rotation.y=yaw;camera.rotation.x=pitch;

  // Battery drain
  power-=DRAIN*dt;
  if(power<=0){power=0;die('Your flashlight died. So did you.');}
  updBatHUD();tickFlash(dt);

  // Entity BFS pathfinding
  const visible=canSeeEntity();
  const watched=isWatched();
  const fast=!watched||!visible;
  document.getElementById('warn').style.opacity=fast?'1':'0';
  const esp=fast?E_FAST:E_SLOW;
  const ep=entGrp.position;
  const ddx=pPos.x-ep.x,ddz=pPos.z-ep.z;
  const dist=Math.sqrt(ddx*ddx+ddz*ddz);

  // Recalculate BFS path periodically
  entPathTimer-=dt;
  if(entPathTimer<=0){
    entPathTimer=PATH_INTERVAL;
    entPath=bfsPath(ep.x,ep.z,pPos.x,pPos.z);
  }

  // Follow BFS path
  if(entPath.length>0){
    const[tcx,tcy]=entPath[0];
    const tx=tcx*CELL+CELL/2,tz=tcy*CELL+CELL/2;
    const ndx=tx-ep.x,ndz=tz-ep.z;
    const nd=Math.sqrt(ndx*ndx+ndz*ndz);
    if(nd<0.3){
      entPath.shift(); // reached this waypoint
    } else {
      const amt=Math.min(esp*dt,nd);
      const sx=ndx/nd*amt,sz=ndz/nd*amt;
      ep.x+=sx;ep.z+=sz;
    }
  } else if(dist>0.5){
    // Direct fallback if no path
    const amt=Math.min(esp*dt,dist);
    ep.x+=ddx/dist*amt;ep.z+=ddz/dist*amt;
  }

  entGrp.rotation.y=Math.atan2(pPos.x-ep.x,pPos.z-ep.z);
  if(dist<1.0)die('It got you.');

  // Batteries
  const now=Date.now();
  for(const b of bats){
    if(b.collected)continue;
    if(Math.hypot(pPos.x-b.pos.x,pPos.z-b.pos.z)<1.0){
      b.collected=true;scene.remove(b.mesh);scene.remove(b.pl);
      power=Math.min(1,power+REFILL);showMsg('BATTERY',1000);
    } else {
      b.mesh.position.y=.20+Math.sin(now*.003)*.08;
      b.mesh.rotation.y+=dt*1.8;
    }
  }

  // Prompt
  const nearBtn=btns.some(b=>!b.pressed&&pPos.distanceTo(b.pos)<2.0);
  const lookBtn=btns.some(b=>!b.pressed&&pPos.distanceTo(b.pos)<2.0&&isLookingAt(b.pos));
  const nearDoor=door&&pPos.distanceTo(door.pos)<2.5;
  document.getElementById('prompt').textContent=nearDoor?'[E] ESCAPE':lookBtn?'[E] PRESS BUTTON':nearBtn?'LOOK AT BUTTON':'WASD · MOUSE · E';

  drawMap();
  renderer.render(scene,camera);
}

// ══════════════════════════════════════════
//  INIT & START
// ══════════════════════════════════════════
function init(){
  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x000000);
  scene.fog=new THREE.FogExp2(0x000000,.06);
  camera=new THREE.PerspectiveCamera(82,innerWidth/innerHeight,.1,48);
  renderer=new THREE.WebGLRenderer({canvas:document.getElementById('canvas'),antialias:false,powerPreference:'high-performance'});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,1.2));
  renderer.shadowMap.enabled=false;
  window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
  mkTex();genMaze();
  initJumpscare();
  // Show menu with entity rendered in background
  pPos.set(CELL*1.5,PH,CELL*1.5);
  buildScene();spawnEntity();
  updBtnHUD();loop();
}

function startGame(){
  dead=false;won=false;active=false;
  bPr=0;power=1;
  keys={f:0,b:0,l:0,r:0};
  if(difficulty==='hard'){
    E_FAST=9.5;
  } else {
    E_FAST=6.8;
  }
  genMaze();buildScene();

  // Player starts at top-left corner, facing INTO the maze (toward +Z, i.e., south/down on map)
  // Yaw = PI means looking toward +Z
  pPos.set(CELL*1.5,PH,CELL*1.5);
  yaw=Math.PI;  // face south (into the maze)
  pitch=0;

  camera.position.copy(pPos);
  camera.rotation.order='YXZ';camera.rotation.y=yaw;camera.rotation.x=0;

  // Spawn entity a few cells ahead of where player is looking (south, cy=4 or 5)
  // Player is at cy=1, looking toward increasing cy
  spawnEntity();

  updBtnHUD();
  document.getElementById('overlay').style.display='none';
  active=true;
  document.body.requestPointerLock();
  showMsg('FIND THE BUTTONS',2000);
}

let menuShown=false;
document.querySelectorAll('.diffBtn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.diffBtn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    difficulty=btn.dataset.diff;
  });
});
document.addEventListener('mousedown', unlockJumpscareAudio, {once:true});
document.addEventListener('keydown', unlockJumpscareAudio, {once:true});
document.getElementById('startBtn').addEventListener('click',()=>{
  if(!menuShown){
    document.getElementById('diffMenu').style.display='flex';
    document.getElementById('startBtn').textContent='START';
    menuShown=true;
  } else {
    document.getElementById('diffMenu').style.display='none';
    unlockJumpscareAudio();
    startGame();
  }
});
init();
</script>
